services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: letpay
      POSTGRES_USER: letpay
      POSTGRES_PASSWORD: letpay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://letpay:letpay@postgres:5432/letpay
      USE_MOCKS: "true"
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      DATABASE_URL: postgresql://letpay:letpay@postgres:5432/letpay
      USE_MOCKS: "true"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-mock-token}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
