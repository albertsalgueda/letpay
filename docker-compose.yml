services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: letpay
      POSTGRES_USER: letpay
      POSTGRES_PASSWORD: letpay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U letpay"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
